# Config 25 plus GT pose supervision for the learned coarse registration.
# Start: python examples/classification/main.py --cfg cfgs/modelnet40ply2048/mvf_10class_ablation/26_one_encoder_shared_scale_gt_pose_supervision.yaml

seed: 8240
deterministic: true
wandb:
  use_wandb: true
  project: mvf_10class_ablation
mode: raw_frames_classification
classification_dataset_format: raw_frames
raw_frames_root: /home/georg/workspace/raw-frames-full
raw_frames_object_multi_view: true
raw_frames_shared_view_normalization: true
raw_frames_return_shared_geometry_views: false
raw_frames_max_views: 5
raw_frames_view_selection: uniform
raw_frames_frame_selection: all
# Used only during raw-frame training to create pose targets; never required at inference.
raw_frames_pose_root: /home/georg/workspace/raw-frame-aggregates-full
raw_frames_pose_required: false
raw_frames_split_ratios: [0.8, 0.1, 0.1]
raw_frames_start_date: null
raw_frames_min_points: 0
raw_frames_exclude_classes:
- reject
- TLS_VEHICLE_CAR_WITH_TRAILER
- TLS_VEHICLE_TRUCK_WITH_TRAILER
- silhouettes_all_axes_10_per_class
raw_frames_min_points_exempt_classes:
- TLS_VEHICLE_MOTORBIKE
- TLS_VEHICLE_TRAILER
raw_frames_classes:
- TLS_VEHICLE_BUS
- TLS_VEHICLE_CAR
- TLS_VEHICLE_MOTORBIKE
- TLS_VEHICLE_SEMI_TRAILER_TRUCK
- TLS_VEHICLE_SMALL_TRUCK
- TLS_VEHICLE_TRAILER
- TLS_VEHICLE_TRUCK
- TLS_VEHICLE_VAN
- SMALL CONSTRUCTION VEHICLE
- SMALL TOW TRUCK
num_points: 512
batch_size: 36
val_batch_size: 36
class_balanced_batches: false
balanced_max_repeat_per_sample: 4
preload_data: true
augment_train: true
augment_rotation_deg: 20.0
augment_scale: [0.9, 1.1]
augment_jitter_sigma: 0.01
augment_jitter_clip: 0.04
augment_dropout: [0.1, 0.4]
augment_translate: 0.5
augment_random_points_ratio: 0.0
use_normals: false
normal_k: 24
auto_class_weights: effective_epoch
auto_class_weight_strategy: inverse_sqrt
epochs: 80
lr: 0.0001
sched: cosine
warmup_epochs: 0
t_max: 80
min_lr: 1.0e-07
grad_norm_clip: 0.0
criterion_args:
  NAME: SmoothCrossEntropy
  label_smoothing: 0.05
export_fused_clouds: true
export_pre_icp_clouds: true
export_fused_raw_frames: true
fused_clouds_per_class: 2
fusion_voxel_size: 0.0
save_local_metrics: true
wandb_log_confusion_matrices: false
wandb_log_pcd_examples: false
wandb_vis_max_samples: 0
wandb_vis_max_wrong_samples: 0
model:
  NAME: MultiViewLateFusionCls
  max_views: 5
  object_loss_weight: 1.0
  view_loss_weight: 1.0
  geometry_loss_weight: 1.0
  # Inherited from Config 25: geometry loss does not alter the classifier encoder.
  reuse_encoder_for_geometry: true
  detach_geometry_features: true
  extra_global_channels: 0
  encoder_args: &late_fusion_encoder
    NAME: PointNextEncoder
    blocks: [1, 1, 1, 1, 1]
    strides: [1, 2, 2, 2, 2]
    width: 16
    in_channels: 3
    radius: 0.15
    radius_scaling: 1.5
    sa_layers: 1
    sa_use_res: true
    nsample: 24
    expansion: 4
    aggr_args:
      feature_type: dp_fj
      reduction: max
    group_args:
      NAME: ballquery
      normalize_dp: true
    conv_args:
      order: conv-norm-act
    act_args:
      act: relu
    norm_args:
      norm: bn
  cls_args:
    NAME: ClsHead
    num_classes: 10
    global_feat: max,avg
    mlps: [192, 192, 128]
    dropout: 0.3
    norm_args:
      norm: bn1d
  geometry_args:
    NAME: MultiViewPointNextCls
    max_views: 5
    minimal_architecture: true
    feature_dim: 192
    global_pooling: max_mean
    feature_projection_args:
      mlps: []
      dropout: 0.0
      activate_last: true
    view_fusion: none
    enable_registration_head: true
    registration_hidden_dim: 128
    registration_head_args:
      mlps: [512, 256, 128]
      dropout: 0.1
      activate_last: false
    max_rotation_deg: 20.0
    max_translation: 10.0
    registration_refinement_steps: 1
    # Supervise the learned coarse pose directly with GT.
    registration_loss_mode: pose
    pose_rotation_weight: 1.0
    pose_translation_weight: 1.0
    pose_loss_beta: 0.1
    enable_icp_refinement: true
    icp_iterations: 8
    icp_points: 128
    icp_max_correspondence_distance: 0.35
    icp_normal_k: 16
    icp_damping: 0.0001
    icp_huber_delta: 0.02
    icp_translation_axes: xyz
    icp_max_translation_step: 0.1
    icp_convergence_tolerance: 0.01
    icp_convergence_patience: 2
    icp_min_iterations: 1
    lambda_cls: 0.0
    lambda_align: 1.0
    lambda_icp_delta_reg: 1.0
    lambda_reg: 0.0
    lambda_residual_correction: 0.0
    lambda_overlap_point: 0.0
    lambda_density: 0.0
    lambda_boundary: 0.0
    lambda_consistency: 0.0
    lambda_occlusion_depth: 0.0
    encoder_args: *late_fusion_encoder
experiment_name: 26_one_encoder_shared_scale_gt_pose_supervision
description: Config 25 with GT-supervised coarse pose regression, no self-supervised alignment loss and XYZ ICP.
