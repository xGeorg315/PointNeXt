# Mixed classification training on aggregate PCDs + raw frame PCDs.
# Train loader combines both sources. Validation/test stay separate:
#   val_normal, val_raw_frames, test_normal, test_raw_frames
# Start:
# python examples/classification/main.py --cfg cfgs/modelnet40ply2048/pointnext-mixed-flat.yaml

mode: mixed_classification
classification_dataset_format: mixed
normal_dataset_root: /home/georg/review-dataset-v3-split/pcd
raw_frames_root: /home/georg/review-dataset-v3-split/raw_frames
mixed_best_metric: mean_oa

review_buckets: [gt-pred-different, gt-pred-same]
review_source_dir: pred
review_split_ratios: [0.8, 0.1, 0.1]
review_start_date: null
review_min_points: 0
raw_frames_split_ratios: [0.8, 0.1, 0.1]
raw_frames_start_date: null
raw_frames_min_points: 0

batch_size: 18
val_batch_size: 18
class_balanced_batches: True
preload_data: True
augment_train: True
augment_rotation_deg: 20.0
augment_scale: [0.8, 1.2]
augment_jitter_sigma: 0.01
augment_jitter_clip: 0.05
augment_dropout: [0.2, 0.5]
augment_translate: 0.1
augment_random_points_ratio: 0.0
augment_random_points_scale: 1.5
use_normals: False
normal_k: 16
save_local_metrics: True
wandb_log_confusion_matrices: False
wandb_log_pcd_examples: False
wandb_vis_max_samples: 0
wandb_vis_max_wrong_samples: 0

exclude_classes:
  - TLS_VEHICLE_CAR_WITH_TRAILER
  - TLS_VEHICLE_TRUCK_WITH_TRAILER
  - TLS_VEHICLE_TRAILER
raw_frames_exclude_classes:
  - reject
  - TLS_VEHICLE_CAR_WITH_TRAILER
  - TLS_VEHICLE_TRUCK_WITH_TRAILER
  - TLS_VEHICLE_TRAILER

model:
  NAME: BaseCls
  extra_global_channels: 0
  encoder_args:
    NAME: PointNextEncoder
    blocks: [1, 1, 1, 1, 1, 1]
    strides: [1, 2, 2, 2, 2, 1]
    width: 32
    in_channels: 3
    radius: 0.15
    radius_scaling: 1.5
    sa_layers: 2
    sa_use_res: True
    nsample: 32
    expansion: 4
    aggr_args:
      feature_type: dp_fj
      reduction: max
    group_args:
      NAME: ballquery
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: relu
    norm_args:
      norm: bn
  cls_args:
    NAME: ClsHead
    num_classes: 6
    mlps: [512, 256, 128, 64]
    norm_args:
      norm: bn1d
